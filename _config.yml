title: zurdo
description: Documentation for the zurdo CLI
url: "https://zurdo.sh"
baseurl: ""

# --- Doks theme settings (theme lives in ./doks-theme, vendored into this repo) ---
doks:
    baseurl: # empty — custom domain serves from the site root
    color_theme: blue # Available themes: blue (default), green, purple, red and yellow
    header:
        logo:
            text: zurdo
            image:
        nav:
            - item_name: How it works
              item_url: '/docs/how-it-works.html'
            - item_name: Installation
              item_url: '/docs/installation.html'
            - item_name: Usage
              item_url: '/docs/usage.html'
            - item_name: Writing PRDs
              item_url: '/docs/writing-prds.html'
            - item_name: Commands
              item_url: '/docs/commands.html'
    footer:
        content:
            logo:
                text: zurdo
                image:
            copyright: Copyright &copy; 2026 Numeron Technologies Inc. <br>Documentation for the <strong>zurdo</strong> CLI.
        social_list:
            - network_name: github
              profile_url: 'https://github.com/NumeronAI'
    google_analytics:
        tracking_code: # Add your Google Analytics tracking code to activate Google Analytics
    comments:
        disqus_forum_shortname: # Add your disqus forum shortname to activate comments

# SASS settings
sass:
    sass_dir: ./doks-theme/_sass
    style: :compressed

# Jekyll settings
layouts_dir: ./doks-theme/_layouts
includes_dir: ./doks-theme/_includes
markdown: kramdown

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

exclude:
  - CLAUDE.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .claude/
  - .agents/
  - skills-lock.json
