title: zurdo
description: Documentation for the zurdo CLI
url: "https://zurdo.sh"
baseurl: ""

# Just the Docs, pinned via remote_theme (jekyll-remote-theme is on the
# GitHub Pages plugin whitelist, so the legacy branch build supports it)
remote_theme: just-the-docs/just-the-docs@v0.10.1
markdown: kramdown

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

# --- Just the Docs settings ---
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  button: false
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/NumeronAI"
aux_links_new_tab: true

nav_external_links:
  - title: Report a zurdo issue
    url: https://github.com/ElOrlis/zurdo-dist/issues
  - title: Docs feedback
    url: https://github.com/NumeronAI/zurdo.github.io/issues

# Renders ```mermaid code fences (used on docs/how-it-works.md)
mermaid:
  version: "9.4.3"

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

back_to_top: true
back_to_top_text: "Back to top"

footer_content: 'Copyright &copy; Numeron Technologies Inc. Documentation for the <strong>zurdo</strong> CLI.'

exclude:
  - CLAUDE.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .claude/
  - .agents/
  - skills-lock.json
